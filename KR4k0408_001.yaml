body:
  text: 楚國先賢傳黃香字文強江夏人博覽傳記群書無不涉獵京師號曰天下無雙江夏黃香孟宗字恭武至孝母好食笋宗入林中哀號方冬為之出因以供養時人皆以為孝感所致石偉字公操南郡人仕吳為光祿大夫吳建威將軍王戒親詣偉大康二年詔以偉為議郎加二千石秩以終厥身偉遂賜狂久竟不受陰蒿字文王南陽新野人衛尉興從祖兄也少喪父母與叔父居恭謙婉順溫良節儉王莽末義兵初起乃與叔父避世蒼梧後徵拜謁者以叔父憂棄官張掖孫攜字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乘龍言得壻如龍也韓塈將終遺言曰夫俗奢示之以儉儉則節之以禮歷見前世送終過制失之甚也若曹敬聞吾言欲以時服葬以土藏穿畢使葬送之以瓦器慎勿有增益也李善字次孫南陽人也本同縣李元蒼頭建武中元家死沒産兒續始生善親自哺養世祖拜善及續並為太子舍人善顯宗時辟公府時以能治劇再遷日南太守從京師之官道經南陽李元冢未至一里乃脫服持劍去草及拜墓哭泣甚悲身炊爨自執俎鼎以修祭應余字子正為郡功曹是時吳蜀不賓山民皆叛余與太守東方袞迸力得出賊便射袞余以身當箭被七瘡因謂賊曰我以身代君已被重瘡若身死君全殞歿無恨因仰天號泣涕血俱下如雨賊見其義烈釋袞不害
